{% if let Some(timeline) = timeline %}
<section class="py-24 px-4 bg-[#14151a] relative">
    <div class="max-w-4xl mx-auto">
        <h2 class="text-center text-3xl font-serif text-white mb-16">
            {{ timeline.timeline_section_title }}
        </h2>

        <div class="relative space-y-16">
            <div
                class="hidden md:block absolute left-1/2 top-0 bottom-0 w-[2px] bg-gray-700 -translate-x-1/2"
            ></div>

            {% for event in timeline.timeline_events %}
            <div
                class="relative flex flex-col md:flex-row items-center justify-between w-full even:md:flex-row-reverse gap-8 md:gap-0"
            >
                <div class="w-full md:w-5/12">
                    <div
                        class="bg-gray-800/80 border border-gray-700 p-6 rounded-xl shadow-lg"
                    >
                        <span
                            class="text-2xl font-bold text-brand-accent mb-2 block"
                        >
                            {{ event.year }}
                        </span>
                        <p class="text-gray-400">{{ event.description }}</p>
                    </div>
                </div>

                <div
                    class="hidden md:block absolute left-1/2 w-4 h-4 rounded-full bg-brand-accent border-4 border-[#14151a] shadow -translate-x-1/2 flex-shrink-0 z-10"
                ></div>

                <div class="w-full md:w-5/12">
                    <img
                        src="{{ event.image_url }}"
                        alt="Memória de {{ event.year }}"
                        class="w-full aspect-video md:aspect-[4/3] object-cover rounded-xl shadow-xl border border-gray-700"
                    />
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endif %}
