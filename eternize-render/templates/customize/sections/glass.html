{% if let Some(glass) = glass %}
<section
    class="min-h-screen py-20 px-4 relative flex items-center justify-center"
    style="background-image: url('{{ glass.glass_background_image_url }}'); background-size: cover; background-position: center;"
>
    <div class="absolute inset-0 bg-black/60 backdrop-blur-xl"></div>

    <div
        class="relative z-10 max-w-6xl w-full grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-6 p-4"
    >
        <div
            class="col-span-1 md:col-span-2 aspect-video rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl flex flex-col items-center justify-center hover:bg-white/20 transition overflow-hidden relative"
        >
            <img
                src="{{ glass.glass_card_one_image_url }}"
                class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay"
            />
            <h3
                class="text-white font-serif text-3xl md:text-4xl z-10 drop-shadow-lg text-center px-4"
            >
                {{ glass.glass_card_one_title }}
            </h3>
        </div>

        <div
            class="col-span-1 relative aspect-square rounded-2xl bg-white/10 backdrop-blur-md border border-white/30 p-8 shadow-2xl flex flex-col items-center justify-center transition transform rotate-2 hover:rotate-0 hover:bg-white/20 md:-translate-y-4"
        >
            <div
                class="absolute -top-3 left-1/2 -translate-x-1/2 w-16 h-6 bg-white/30 backdrop-blur-lg shadow-sm transform -rotate-3"
            ></div>

            <i class="ph ph-quotes text-3xl text-white/50 mb-4"></i>
            <p
                class="text-white/95 text-center font-serif italic text-lg leading-relaxed drop-shadow-md"
            >
                "{{ glass.glass_card_two_text }}"
            </p>
        </div>

        <div
            class="col-span-1 md:col-span-3 rounded-2xl bg-white/5 backdrop-blur-lg border border-white/10 p-2 shadow-2xl transition overflow-hidden relative group"
        >
            <video
                controls
                preload="metadata"
                class="w-full aspect-video bg-black rounded-xl shadow-inner object-contain"
            >
                <source
                    src="{{ glass.glass_card_three_video_url }}"
                    type="video/mp4"
                />
                Seu navegador não suporta a reprodução deste vídeo.
            </video>
        </div>
    </div>
</section>
{% endif %}
