{% if let Some(glass) = glass %}
<section
    class="min-h-screen py-20 px-4 relative flex items-center justify-center"
    style="background-image: url('{{ glass.glass_background_image_url }}'); background-size: cover; background-position: center;"
>
    <div class="absolute inset-0 bg-black/40 backdrop-blur-md"></div>

    <div
        class="relative z-10 max-w-6xl w-full grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-4 p-4"
    >
        <div
            class="col-span-1 md:col-span-2 aspect-video rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl flex flex-col items-center justify-center hover:bg-white/20 transition overflow-hidden relative"
        >
            <img
                src="{{ glass.glass_card_one_image_url }}"
                class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay"
            />
            <h3
                class="text-white font-serif text-3xl z-10 drop-shadow-lg text-center px-4"
            >
                {{ glass.glass_card_one_title }}
            </h3>
        </div>

        <div
            class="col-span-1 aspect-square rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 p-8 shadow-2xl flex flex-col items-center justify-center hover:bg-white/20 transition md:-translate-y-8"
        >
            <i class="ph ph-article text-4xl text-white/70 mb-4"></i>
            <p class="text-white/90 text-center font-light">
                {{ glass.glass_card_two_text }}
            </p>
        </div>

        <div
            class="col-span-1 md:col-span-3 aspect-[21/9] rounded-2xl bg-[#1A1C23]/40 backdrop-blur-lg border border-white/10 p-2 shadow-2xl flex flex-col items-center justify-center transition overflow-hidden relative group"
        >
            <video
                controls
                preload="metadata"
                class="w-full h-full object-cover rounded-xl shadow-inner"
            >
                <source
                    src="{{ glass.glass_card_three_video_url }}"
                    type="video/mp4"
                />
                Seu navegador não suporta a reprodução deste vídeo.
            </video>
        </div>
    </div>
</section>
{% endif %}
