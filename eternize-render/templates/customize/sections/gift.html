{% if let Some(gift) = gift %}
<style>
    @keyframes floatGift {
        0%,
        100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-12px);
        }
    }

    @keyframes glowPulse {
        0%,
        100% {
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
        }
        50% {
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.9));
        }
    }

    .animate-float {
        animation: floatGift 3s ease-in-out infinite;
    }
    .animate-glow {
        animation: glowPulse 2s ease-in-out infinite;
    }
</style>

<section
    class="min-h-[80vh] flex flex-col items-center justify-center py-24 px-4 bg-[#111216] relative overflow-hidden"
>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-brand-accent/10 rounded-full blur-[120px] pointer-events-none"
    ></div>

    <div
        id="gift-container"
        class="text-center z-10 max-w-xl w-full relative opacity-0 translate-y-12 transition-all duration-1000 ease-out"
    >
        <div
            id="gift-closed"
            class="space-y-12 transition-all duration-700 ease-out"
        >
            <h2
                class="text-3xl md:text-4xl font-serif text-white italic drop-shadow-md"
            >
                {{ gift.gift_teaser_text }}
            </h2>

            <button
                onclick="openGift()"
                class="group outline-none block mx-auto transition-transform duration-300 hover:scale-110"
            >
                <div class="animate-float">
                    <i
                        class="ph ph-gift text-8xl md:text-9xl text-brand-accent animate-glow transition-colors duration-300 group-hover:text-white"
                    ></i>
                </div>
            </button>

            <p
                class="text-xs md:text-sm font-semibold tracking-[0.3em] uppercase text-gray-400 border border-gray-700/50 px-8 py-3 rounded-full inline-block bg-gray-800/30 backdrop-blur-sm shadow-lg"
            >
                {{ gift.gift_interaction_instruction }}
            </p>
        </div>

        <div
            id="gift-open"
            class="hidden opacity-0 scale-90 space-y-8 transition-all duration-700 ease-out"
        >
            <h2
                class="text-4xl md:text-5xl font-serif text-brand-champagne drop-shadow-lg"
            >
                {{ gift.gift_reveal_title }}
            </h2>

            <div
                class="p-10 bg-gradient-to-b from-white/10 to-transparent border border-brand-accent/40 rounded-2xl backdrop-blur-md shadow-[0_0_50px_rgba(59,130,246,0.15)] relative overflow-hidden group"
            >
                <div
                    class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/50 to-transparent"
                ></div>

                <p class="text-2xl text-white font-serif italic mb-6">
                    {{ gift.gift_surprise_name }}
                </p>
                <p
                    class="text-gray-300 text-base md:text-lg leading-relaxed mb-10 font-light"
                >
                    {{ gift.gift_surprise_message }}
                </p>

                <a
                    href="{{ gift.gift_surprise_action_url }}"
                    target="_blank"
                    class="inline-block bg-brand-accent text-white px-10 py-4 rounded-full text-sm font-bold uppercase tracking-[0.2em] hover:bg-white hover:text-brand-accent hover:shadow-[0_0_30px_rgba(255,255,255,0.6)] transition-all duration-300 transform hover:-translate-y-1"
                >
                    {{ gift.gift_surprise_button_label }}
                </a>
            </div>
        </div>
    </div>

    <script>
        function openGift() {
            const closed = document.getElementById("gift-closed");
            const open = document.getElementById("gift-open");

            closed.classList.add("opacity-0", "scale-110", "blur-md");

            setTimeout(() => {
                closed.classList.add("hidden");
                open.classList.remove("hidden");

                setTimeout(() => {
                    open.classList.remove("opacity-0", "scale-90");
                    open.classList.add("opacity-100", "scale-100");
                }, 50);
            }, 600);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver(
                (entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.remove(
                                "opacity-0",
                                "translate-y-12",
                            );
                            observer.unobserve(entry.target);
                        }
                    });
                },
                { threshold: 0.2 },
            );

            const container = document.getElementById("gift-container");
            if (container) observer.observe(container);
        });
    </script>
</section>
{% endif %}
