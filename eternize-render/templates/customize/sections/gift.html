{% if let Some(gift) = gift %}
<section
    class="min-h-[80vh] flex flex-col items-center justify-center py-24 px-4 bg-[#111216] relative"
>
    <div class="text-center z-10 max-w-lg w-full">
        <div id="gift-closed" class="space-y-8 transition-all duration-500">
            <h2 class="text-2xl text-gray-400 font-light">
                {{ gift.gift_teaser_text }}
            </h2>

            <button
                onclick="openGift()"
                class="group relative w-32 h-32 mx-auto bg-gray-800 rounded-2xl border border-gray-600 flex items-center justify-center shadow-lg hover:shadow-brand-accent/20 hover:border-brand-accent transition-all duration-300 hover:-translate-y-2"
            >
                <i
                    class="ph ph-gift text-5xl text-brand-accent group-hover:scale-110 transition-transform"
                ></i>
            </button>

            <p
                class="text-sm font-semibold tracking-[0.2em] uppercase text-white border border-white/20 px-6 py-2 rounded-full inline-block"
            >
                {{ gift.gift_interaction_instruction }}
            </p>
        </div>

        <div
            id="gift-open"
            class="hidden opacity-0 space-y-6 transition-all duration-700 transform translate-y-8"
        >
            <h2 class="text-3xl font-serif text-white">
                {{ gift.gift_reveal_title }}
            </h2>
            <div
                class="p-8 bg-gray-800/50 border border-brand-accent/50 rounded-xl backdrop-blur-sm"
            >
                <p class="text-xl text-brand-champagne mb-4">
                    {{ gift.gift_surprise_name }}
                </p>
                <p class="text-gray-400 text-sm mb-6">
                    {{ gift.gift_surprise_message }}
                </p>
                <a
                    href="{{ gift.gift_surprise_action_url }}"
                    target="_blank"
                    class="inline-block bg-brand-accent text-white px-8 py-3 rounded text-sm font-bold uppercase tracking-wider hover:bg-opacity-80 transition"
                >
                    {{ gift.gift_surprise_button_label }}
                </a>
            </div>
        </div>
    </div>

    <script>
        function openGift() {
            const closed = document.getElementById("gift-closed");
            const open = document.getElementById("gift-open");

            closed.classList.add("opacity-0", "scale-95");

            setTimeout(() => {
                closed.classList.add("hidden");
                open.classList.remove("hidden");

                setTimeout(() => {
                    open.classList.remove("opacity-0", "translate-y-8");
                }, 50);
            }, 300);
        }
    </script>
</section>
{% endif %}
