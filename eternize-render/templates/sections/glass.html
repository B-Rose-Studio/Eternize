<section
    class="min-h-screen py-20 px-4 relative flex items-center justify-center"
    style="background-image: url('{{ model.background_image_url }}'); background-size: cover; background-position: center;"
>
    <div class="absolute inset-0 bg-black/40"></div>

    <div
        class="relative z-10 max-w-6xl w-full grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-4 p-4"
    >
        <div
            class="col-span-1 md:col-span-2 aspect-video rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 p-8 shadow-2xl flex flex-col items-center justify-center hover:bg-white/20 transition"
        >
            <i class="ph ph-image text-4xl text-white/70 mb-4"></i>
            <h3 class="text-white font-serif text-2xl">
                {{ model.card_one_title }}
            </h3>
        </div>

        <div
            class="col-span-1 aspect-square rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 p-8 shadow-2xl flex flex-col items-center justify-center hover:bg-white/20 transition md:-translate-y-8"
        >
            <i class="ph ph-article text-4xl text-white/70 mb-4"></i>
            <p class="text-white/90 text-center font-light">
                {{ model.card_two_text }}
            </p>
        </div>

        <div
            class="col-span-1 md:col-span-3 aspect-[21/9] rounded-2xl bg-[#1A1C23]/40 backdrop-blur-lg border border-white/10 p-8 shadow-2xl flex flex-col items-center justify-center hover:bg-[#1A1C23]/60 transition"
        >
            <i
                class="ph ph-play-circle text-5xl text-brand-accent mb-4 cursor-pointer hover:scale-110 transition"
            ></i>
            <span class="text-gray-300 text-sm tracking-widest uppercase"
                >{{ model.card_three_cta_text }}</span
            >
        </div>
    </div>
</section>
