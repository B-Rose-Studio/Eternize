<section class="min-h-screen flex flex-col items-center justify-center py-20 px-4">
  <div class="max-w-4xl w-full text-center space-y-12">

    <div class="relative w-full h-80 md:h-[500px] rounded-xl overflow-hidden border border-gray-700 shadow-2xl">
      <img src="{{ hero_cover_image_url }}" alt="Hero Visual" class="w-full h-full object-cover opacity-80">
      <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
        <span
          class="px-6 py-2 border-2 border-white rounded-full text-white font-serif tracking-widest text-sm uppercase backdrop-blur-sm">
          {{ hero_badge_text }}
        </span>
      </div>
    </div>

    <div class="space-y-4 max-w-2xl mx-auto">
      <h1 class="text-4xl md:text-6xl font-serif text-white">{{ hero_main_title }}</h1>
      <div class="w-24 h-1 bg-brand-accent mx-auto rounded-full"></div>
      <p class="text-lg md:text-xl text-gray-400 font-light">{{ hero_subtitle_message }}</p>
    </div>

    <div class="grid grid-cols-3 gap-4 md:gap-8 max-w-2xl mx-auto pt-8">
      {% for highlight in hero_highlight_items %}
      <div
        class="aspect-square bg-gray-800/50 rounded-lg border border-gray-700 flex items-center justify-center p-4 hover:bg-gray-700 transition">
        <p class="text-sm md:text-base text-gray-300 text-center">{{ highlight.label }}</p>
      </div>
      {% endfor %}
    </div>

  </div>
</section>
