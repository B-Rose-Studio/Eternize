<section class="py-24 px-4 bg-brand-dark">
  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

    <div class="order-2 md:order-1 border border-gray-700 p-8 md:p-12 rounded-xl bg-gray-800/20">
      <h2 class="text-sm tracking-[0.3em] text-brand-champagne uppercase mb-4">{{ gala_eyebrow_text }}</h2>
      <h3 class="text-4xl font-serif text-white mb-6 leading-tight">{{ gala_main_title }}</h3>

      <div class="space-y-4 text-gray-400 font-light mb-10">
        <p>{{ gala_first_paragraph }}</p>
        <p>{{ gala_second_paragraph }}</p>
      </div>

      <button
        class="px-8 py-4 bg-[#7A8B9E] hover:bg-[#657688] text-white rounded-lg uppercase tracking-wider text-sm font-semibold transition duration-300 shadow-lg">
        {{ gala_action_button_text }}
      </button>
    </div>

    <div
      class="order-1 md:order-2 h-[500px] bg-gradient-to-tr from-gray-800 to-gray-700 rounded-xl flex items-center justify-center border border-gray-600 shadow-2xl overflow-hidden relative">
      <img src="{{ gala_background_image_url }}"
        class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay">
      <i class="ph ph-sparkle text-6xl text-brand-champagne drop-shadow-lg animate-pulse"></i>
    </div>

  </div>
</section>
