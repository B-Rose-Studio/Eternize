<section class="py-24 px-4 bg-[#14151a]">
    <div class="max-w-4xl mx-auto">
        <h2 class="text-center text-3xl font-serif text-white mb-16">
            {{ model.section_title }}
        </h2>

        <div class="relative space-y-16">
            <div
                class="hidden md:block absolute left-1/2 top-0 bottom-0 w-[2px] bg-gray-700 -translate-x-1/2"
            ></div>

            {% for event in model.events %}
            <div
                class="relative flex flex-col md:flex-row items-center justify-between w-full"
            >
                <div class="w-full md:w-5/12 mb-8 md:mb-0">
                    <div
                        class="bg-gray-800/80 border border-gray-700 p-6 rounded-xl shadow-lg md:text-right"
                    >
                        <span class="text-2xl font-bold text-white mb-2 block"
                            >{{ event.year }}</span
                        >
                        <p class="text-gray-400">{{ event.description }}</p>
                    </div>
                </div>

                <div
                    class="absolute left-4 md:left-1/2 w-4 h-4 rounded-full bg-blue-300 border-4 border-[#14151a] shadow md:-translate-x-1/2 flex-shrink-0 z-10"
                ></div>

                <div class="w-full md:w-5/12 pl-12 md:pl-0"></div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
