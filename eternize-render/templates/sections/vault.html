{% if has_surprise_gift %}
<section class="min-h-[80vh] flex flex-col items-center justify-center py-24 px-4 bg-[#111216] relative">

  <div class="text-center z-10 max-w-lg w-full">

    <div id="presente-fechado" class="space-y-8 transition-all duration-500">
      <h2 class="text-2xl text-gray-400 font-light">{{ vault_teaser_text }}</h2>

      <button onclick="abrirPresente()"
        class="group relative w-32 h-32 mx-auto bg-gray-800 rounded-2xl border border-gray-600 flex items-center justify-center shadow-lg hover:shadow-brand-accent/20 hover:border-brand-accent transition-all duration-300 hover:-translate-y-2">
        <i class="ph ph-gift text-5xl text-blue-300 group-hover:text-brand-accent transition-colors"></i>
      </button>

      <p
        class="text-sm font-semibold tracking-[0.2em] uppercase text-white border border-white/20 px-6 py-2 rounded-full inline-block">
        {{ vault_interaction_instruction }}
      </p>
    </div>

    <div id="presente-aberto" class="hidden opacity-0 space-y-6 transition-all duration-700 transform translate-y-8">
      <h2 class="text-3xl font-serif text-white">{{ vault_reveal_title }}</h2>
      <div class="p-8 bg-gray-800/50 border border-brand-accent/50 rounded-xl backdrop-blur-sm">
        <p class="text-xl text-brand-champagne mb-4">{{ surprise_gift_name }}</p>
        <p class="text-gray-400 text-sm mb-6">{{ surprise_gift_message }}</p>
        <a href="{{ surprise_gift_action_url }}" target="_blank"
          class="inline-block bg-brand-accent text-white px-8 py-3 rounded text-sm font-bold uppercase tracking-wider hover:bg-opacity-80 transition">
          {{ surprise_gift_button_label }}
        </a>
      </div>
    </div>

  </div>

  <script>
  </script>
</section>
{% endif %}
